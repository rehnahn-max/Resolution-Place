<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | Resolution Place</title>

    <link rel="stylesheet" href="css/style.css">

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f5f5f5;
            font-family: Arial, sans-serif;
        }

        .login-box {
            width: 100%;
            max-width: 400px;
            background: #fff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .login-box h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            outline: none;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
            font-weight: bold;
        }

        .btn-login {
            background: #000;
            color: #fff;
        }

        .btn-register {
            background: #eee;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .text {
            text-align: center;
            font-size: 12px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div class="login-box">

        <h2>Resolution Place</h2>

        <!-- EMAIL -->
        <input type="email" id="email" placeholder="E-mail">

        <!-- SENHA -->
        <input type="password" id="password" placeholder="Senha">

        <!-- LOGIN -->
        <button class="btn btn-login" onclick="login()">
            Entrar
        </button>

        <!-- CADASTRO -->
        <button class="btn btn-register" onclick="cadastrar()">
            Criar conta
        </button>

        <p class="text">Marketplace de usados e novos</p>

    </div>

    <!-- Firebase Auth JS -->
    <script type="module" src="js/auth.js"></script>

</body>

</html>
